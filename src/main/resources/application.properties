spring.application.name=shorturl
server.port=8080

# H2 Database (file-based biar persistent)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=1


# Thymeleaf
spring.thymeleaf.cache=false

# Admin default credentials (ganti di production!)
app.admin.username=admin
app.admin.password=admin123

# Base URL untuk short link (ganti sesuai domain)
app.base-url=http://localhost:8080

# Logging
# Aktifkan geolocation lookup dari IP (via ip-api.com, free tier: 45 req/menit)
# Set false untuk offline mode atau privacy concern
app.log.geolocation-enabled=true


spring.servlet.multipart.max-file-size=10MB
# Max total request (untuk bulk upload, misal 10 file × 10MB = 100MB)
spring.servlet.multipart.max-request-size=110MB

# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true
