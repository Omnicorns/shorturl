<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #FAFAF9;
            --surface: #FFFFFF;
            --border: #E7E5E4;
            --border-strong: #D6D3D1;
            --text: #1C1917;
            --text-muted: #78716C;
            --text-subtle: #A8A29E;
            --primary: #0F172A;
            --primary-hover: #1E293B;
            --accent: #4F46E5;
            --error-bg: #FEF2F2;
            --error-border: #FECACA;
            --error-text: #991B1B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(79, 70, 229, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(15, 23, 42, 0.03) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .login-box {
            background: var(--surface);
            padding: 40px 36px 32px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 8px 24px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 76px;
            height: 76px;
            margin: 0 auto 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 1px solid var(--border);
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 8px 20px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .logo img {
            width: 58px;
            height: 58px;
            object-fit: contain;
            display: block;
        }

        h1 {
            text-align: center;
            color: var(--text);
            margin-bottom: 6px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 28px;
            font-size: 14px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        input {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input::placeholder {
            color: var(--text-subtle);
        }

        input:hover {
            border-color: #A8A29E;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .input-wrap input[type="password"],
        .input-wrap input.has-toggle {
            padding-right: 42px;
        }

        .toggle-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            padding: 6px;
            margin: 0;
            width: auto;
            cursor: pointer;
            color: var(--text-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: color 0.15s ease, background 0.15s ease;
        }

        .toggle-btn:hover {
            color: var(--text);
            background: var(--bg);
        }

        .toggle-btn svg {
            width: 18px;
            height: 18px;
        }

        button[type="submit"] {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
            transition: background 0.15s ease, transform 0.05s ease;
        }

        button[type="submit"]:hover {
            background: var(--primary-hover);
        }

        button[type="submit"]:active {
            transform: scale(0.99);
        }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .back {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
        }

        .back a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .back a:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
<div class="login-box">

    <!-- LOGO PNG -->
    <div class="logo" aria-label="Logo">
        <img th:src="@{/img.png}" src="/img.png" alt="Logo Admin">
    </div>

    <h1>Admin Login</h1>
    <p class="subtitle">Masuk untuk mengelola short URL</p>

    <div th:if="${param.error}" class="error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>Username atau password salah.</span>
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="field">
            <label for="username">Username</label>
            <div class="input-wrap">
                <input type="text" id="username" name="username" placeholder="admin" required autofocus autocomplete="username">
            </div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" name="password" class="has-toggle" placeholder="••••••••" required autocomplete="current-password">
                <button type="button" class="toggle-btn" id="togglePassword" aria-label="Tampilkan password">
                    <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit">Login</button>
    </form>

    <p class="back"><a href="/">← Kembali ke Beranda</a></p>
</div>

<script>
    (function () {
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        const eyeOpen = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        const eyeOff = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';

        toggleBtn.addEventListener('click', function () {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.innerHTML = isPassword ? eyeOff : eyeOpen;
            toggleBtn.setAttribute('aria-label', isPassword ? 'Sembunyikan password' : 'Tampilkan password');
        });
    })();
</script>
</body>
</html>
