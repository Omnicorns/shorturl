<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white; padding: 40px;
            border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%; max-width: 400px;
        }
        h1 {
            text-align: center; color: #1F2937;
            margin-bottom: 8px; font-size: 26px;
        }
        .subtitle {
            text-align: center; color: #6B7280;
            margin-bottom: 28px; font-size: 14px;
        }
        .field { margin-bottom: 16px; }
        label {
            display: block; font-size: 13px; font-weight: 500;
            color: #374151; margin-bottom: 6px;
        }
        input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #D1D5DB; border-radius: 6px;
            font-size: 14px; font-family: inherit;
        }
        input:focus {
            outline: none; border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        button {
            width: 100%; background: #4F46E5; color: white;
            border: none; padding: 11px; border-radius: 6px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            font-family: inherit; margin-top: 8px;
        }
        button:hover { background: #4338CA; }
        .error {
            background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA;
            padding: 10px; border-radius: 6px; font-size: 13px;
            margin-bottom: 16px;
        }
        .back {
            text-align: center; margin-top: 20px;
            font-size: 13px;
        }
        .back a { color: #6B7280; text-decoration: none; }
        .back a:hover { color: #4F46E5; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Admin Login</h1>
        <p class="subtitle">Masuk untuk mengelola short URL</p>

        <div th:if="${param.error}" class="error">
            Username atau password salah.
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>

        <p class="back"><a href="/">← Kembali ke Beranda</a></p>
    </div>
</body>
</html>
